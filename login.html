<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
    <title>Login - MISHELL'ES BOUTIQUE Admin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <meta name="theme-color" content="#D988B9">

    <style>
        :root {
            --primary-color: #D988B9;
            --primary-dark: #c76fa5;
            --primary-darker: #b35d92;
            --bg-gradient-start: #f7d9e9;
            --bg-gradient-end: #f4e3ee;
        }

        * {
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
        }

        body {
            background: linear-gradient(160deg, var(--primary-color) 0%, var(--bg-gradient-start) 45%, var(--bg-gradient-end) 100%);
            background-attachment: fixed;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-font-smoothing: antialiased;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        .login-container {
            max-width: 420px;
            width: 100%;
            padding: 24px 16px;
        }

        .login-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(90, 30, 60, 0.25);
            padding: 36px 28px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-section {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo-badge {
            width: 68px;
            height: 68px;
            border-radius: 20px;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-darker));
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            box-shadow: 0 8px 20px rgba(217, 136, 185, 0.4);
        }

        .logo-badge i {
            font-size: 1.9rem;
            color: white;
        }

        .logo-section h1 {
            color: #2d1b26;
            font-weight: 700;
            font-size: 1.6rem;
            margin: 0;
        }

        .logo-section p {
            color: #8a7a85;
            font-size: 0.9rem;
            margin-top: 4px;
        }

        .form-label {
            font-weight: 600;
            color: #495057;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .form-control,
        .form-select {
            border: 2px solid #eee0e8;
            border-radius: 12px;
            padding: 13px 15px;
            font-size: 16px;
            transition: all 0.2s ease;
            background-color: #fdfbfc;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(217, 136, 185, 0.2);
            background-color: white;
        }

        .input-group-text {
            background: #fdfbfc;
            border: 2px solid #eee0e8;
            border-right: none;
            border-radius: 12px 0 0 12px;
            color: var(--primary-dark);
        }

        .input-group:focus-within .input-group-text {
            border-color: var(--primary-color);
        }

        .input-group .form-control,
        .input-group .form-select {
            border-left: none;
            border-radius: 0 12px 12px 0;
        }

        .btn-login {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-darker));
            border: none;
            border-radius: 12px;
            padding: 15px;
            font-weight: 600;
            font-size: 1rem;
            color: white;
            width: 100%;
            min-height: 52px;
            margin-top: 24px;
            transition: all 0.25s ease;
            touch-action: manipulation;
        }

        .btn-login:hover,
        .btn-login:focus-visible {
            background: linear-gradient(135deg, var(--primary-dark), var(--primary-darker));
            box-shadow: 0 8px 20px rgba(217, 136, 185, 0.4);
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        .btn-login:disabled {
            background: #d9c9d3;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .alert {
            border-radius: 12px;
            padding: 12px 15px;
            font-size: 0.88rem;
            margin-top: 16px;
            display: none;
        }

        .spinner-border-sm {
            width: 1rem;
            height: 1rem;
            border-width: 0.15em;
        }

        .password-toggle {
            cursor: pointer;
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #a08a99;
            z-index: 10;
            padding: 8px;
            margin: -8px;
            touch-action: manipulation;
        }

        .password-toggle:hover {
            color: var(--primary-color);
        }

        .form-floating-custom {
            position: relative;
        }

        a#forgotPasswordLink {
            color: var(--primary-dark);
            text-decoration: none;
            font-weight: 500;
        }

        a#forgotPasswordLink:hover {
            text-decoration: underline;
        }

        /* Pantallas pequeñas de celular: la tarjeta ocupa el ancho completo
           y baja el padding para no sentirse apretada */
        @media (max-width: 380px) {
            .login-container {
                padding: 16px 12px;
            }

            .login-card {
                padding: 28px 20px;
                border-radius: 20px;
            }
        }

        /* En pantallas muy bajas (celular en horizontal) evitamos que la
           tarjeta se corte: dejamos de centrar verticalmente y permitimos
           scroll natural del body */
        @media (max-height: 640px) {
            body {
                align-items: flex-start;
            }

            .login-container {
                padding-top: max(24px, env(safe-area-inset-top));
                padding-bottom: max(24px, env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <div class="logo-badge">
                    <i class="bi bi-shop"></i>
                </div>
                <h1>Mishell's Boutique</h1>
                <p>Panel de Administración</p>
            </div>

            <form id="loginForm">
                <div class="mb-3">
                    <label for="user-select" class="form-label">Usuario</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-person"></i>
                        </span>
                        <select class="form-select" id="user-select" required>
                            <option value="" selected disabled>Selecciona tu usuario...</option>
                            <option value="__other__">No aparezco en la lista / usar correo</option>
                        </select>
                    </div>
                </div>

                <div class="mb-3" id="manual-email-group" style="display:none;">
                    <label for="email" class="form-label">Correo Electrónico</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-envelope"></i>
                        </span>
                        <input
                            type="email"
                            class="form-control"
                            id="email"
                            placeholder="correo@ejemplo.com"
                            autocomplete="email"
                        >
                    </div>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Contraseña</label>
                    <div class="form-floating-custom">
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-lock"></i>
                            </span>
                            <input
                                type="password"
                                class="form-control"
                                id="password"
                                placeholder="••••••••"
                                required
                                autocomplete="current-password"
                            >
                        </div>
                        <i class="bi bi-eye password-toggle" id="togglePassword"></i>
                    </div>
                    <div class="text-end mt-2">
                        <a href="#" id="forgotPasswordLink" class="small">¿Olvidaste tu contraseña?</a>
                    </div>
                </div>

                <button type="submit" class="btn btn-login" id="loginBtn">
                    <span id="loginBtnText">Iniciar Sesión</span>
                    <span id="loginSpinner" style="display: none;">
                        <span class="spinner-border spinner-border-sm me-2"></span>
                        Iniciando...
                    </span>
                </button>

                <div class="alert alert-danger" id="errorAlert" role="alert">
                    <i class="bi bi-exclamation-circle me-2"></i>
                    <span id="errorMessage"></span>
                </div>
                <div class="alert alert-success" id="successAlert" role="alert">
                    <i class="bi bi-check-circle me-2"></i>
                    <span id="successMessage"></span>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBB55I4aWpH5hOtqK6FdNzZCuYCRm1siiI",
            authDomain: "mishell-boutique-admin.firebaseapp.com",
            projectId: "mishell-boutique-admin",
            storageBucket: "mishell-boutique-admin.firebasestorage.app",
            messagingSenderId: "399662956877",
            appId: "1:399662956877:web:084236f5bb3cf6f0a8f704",
            measurementId: "G-TZ3WQ8LSXH"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Elements
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const loginBtnText = document.getElementById('loginBtnText');
        const loginSpinner = document.getElementById('loginSpinner');
        const errorAlert = document.getElementById('errorAlert');
        const errorMessage = document.getElementById('errorMessage');
        const successAlert = document.getElementById('successAlert');
        const successMessage = document.getElementById('successMessage');
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const userSelect = document.getElementById('user-select');
        const manualEmailGroup = document.getElementById('manual-email-group');
        const manualEmailInput = document.getElementById('email');
        const forgotPasswordLink = document.getElementById('forgotPasswordLink');

        // ─── Directorio de usuarios (solo nombre + correo, sin rol ni
        // permisos) para el selector. Se guarda en Firestore en
        // config/directorio_usuarios — esa colección ya es de lectura
        // pública en las Security Rules (la usa el QR de pagos), así que
        // login.html puede leerlo sin sesión y mostrar la lista completa en
        // cualquier dispositivo, no solo en los que ya iniciaron sesión ahí.
        // localStorage se usa solo como caché para pintar algo de inmediato
        // mientras se confirma la lista real contra Firestore.
        const DIRECTORIO_KEY = 'mishellUsuariosDirectorio';
        const DIRECTORIO_DOC = doc(db, 'config', 'directorio_usuarios');

        function getDirectorioCache() {
            try {
                return JSON.parse(localStorage.getItem(DIRECTORIO_KEY)) || [];
            } catch (e) {
                return [];
            }
        }

        function upsertDirectorioCache(uid, nombre, email) {
            const directorio = getDirectorioCache();
            const idx = directorio.findIndex(u => u.uid === uid);
            const entry = { uid, nombre, email };
            if (idx >= 0) directorio[idx] = entry; else directorio.push(entry);
            localStorage.setItem(DIRECTORIO_KEY, JSON.stringify(directorio));
        }

        function poblarUserSelect(directorio, { esDefinitivo } = {}) {
            // Quitar las opciones de usuario pintadas antes (deja el placeholder y "otro")
            userSelect.querySelectorAll('option[data-email]').forEach(opt => opt.remove());

            const valorPrevio = userSelect.value;
            const ordenado = [...directorio].sort((a, b) => a.nombre.localeCompare(b.nombre));
            ordenado.forEach(u => {
                const opt = document.createElement('option');
                opt.value = u.uid;
                opt.textContent = u.nombre;
                opt.dataset.email = u.email;
                userSelect.insertBefore(opt, userSelect.querySelector('option[value="__other__"]'));
            });

            // Si ya había algo elegido (o escrito en modo manual), no lo pisamos
            if (ordenado.some(u => u.uid === valorPrevio)) {
                userSelect.value = valorPrevio;
            } else if (esDefinitivo && ordenado.length === 0) {
                // Solo tras confirmar contra Firestore: si de verdad no hay nadie, usar correo
                userSelect.value = '__other__';
                manualEmailGroup.style.display = 'block';
                manualEmailInput.required = true;
            }
        }

        // 1) Pintar de inmediato con lo que haya en caché (puede estar vacío o desactualizado)
        poblarUserSelect(getDirectorioCache());

        // 2) Confirmar contra Firestore (fuente real, funciona en cualquier dispositivo)
        getDoc(DIRECTORIO_DOC).then(snap => {
            const usuarios = snap.exists() ? (snap.data().usuarios || []) : [];
            localStorage.setItem(DIRECTORIO_KEY, JSON.stringify(usuarios));
            poblarUserSelect(usuarios, { esDefinitivo: true });
        }).catch(error => {
            console.warn('No se pudo cargar el directorio de usuarios desde Firestore:', error);
            // Si ya había algo en caché se deja tal cual; si no, no forzamos "otro"
            // porque puede ser un problema de conexión, no que no haya usuarios.
        });

        userSelect.addEventListener('change', () => {
            const esOtro = userSelect.value === '__other__';
            manualEmailGroup.style.display = esOtro ? 'block' : 'none';
            manualEmailInput.required = esOtro;
            if (!esOtro) manualEmailInput.value = '';
        });

        function resolveEmail() {
            if (userSelect.value === '__other__') {
                return manualEmailInput.value.trim();
            }
            const selected = userSelect.selectedOptions[0];
            return selected ? (selected.dataset.email || '') : '';
        }

        // Toggle password visibility
        togglePassword.addEventListener('click', () => {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            togglePassword.classList.toggle('bi-eye');
            togglePassword.classList.toggle('bi-eye-slash');
        });

        // Show error
        function showError(message) {
            errorMessage.textContent = message;
            errorAlert.style.display = 'block';
            setTimeout(() => {
                errorAlert.style.display = 'none';
            }, 5000);
        }

        // Hide error
        function hideError() {
            errorAlert.style.display = 'none';
        }

        // Show success
        function showSuccess(message) {
            successMessage.textContent = message;
            successAlert.style.display = 'block';
            setTimeout(() => {
                successAlert.style.display = 'none';
            }, 6000);
        }

        // ¿Olvidaste tu contraseña?
        forgotPasswordLink.addEventListener('click', async (e) => {
            e.preventDefault();
            hideError();

            const email = resolveEmail();
            if (!email) {
                showError('Primero selecciona tu usuario (o escribe tu correo) para poder enviarte el enlace');
                return;
            }

            if (!confirm(`Se enviará un enlace para restablecer la contraseña a:\n${email}\n\n¿Continuar?`)) {
                return;
            }

            try {
                await sendPasswordResetEmail(auth, email);
                showSuccess('Te enviamos un correo con el enlace para restablecer tu contraseña. Revisa tu bandeja de entrada (y spam).');
            } catch (error) {
                console.error('Reset password error:', error);
                showError(error.code === 'auth/user-not-found'
                    ? 'No existe una cuenta con ese correo'
                    : 'No se pudo enviar el correo de restablecimiento. Intenta de nuevo.');
            }
        });

        // Handle form submission
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            const email = resolveEmail();
            const password = document.getElementById('password').value;

            // Validate fields
            if (!email || !password) {
                showError(userSelect.value === '' ? 'Selecciona tu usuario' : 'Por favor, completa todos los campos');
                return;
            }

            // Disable button and show spinner
            loginBtn.disabled = true;
            loginBtnText.style.display = 'none';
            loginSpinner.style.display = 'inline';

            try {
                // Sign in with Firebase Auth
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // Check if user exists in 'usuarios' collection
                const userDoc = await getDoc(doc(db, 'usuarios', user.uid));

                if (!userDoc.exists()) {
                    // User not found in database
                    await auth.signOut();
                    showError('Usuario no autorizado para acceder al panel de administración');
                    loginBtn.disabled = false;
                    loginBtnText.style.display = 'inline';
                    loginSpinner.style.display = 'none';
                    return;
                }

                const userData = userDoc.data();

                // Check if user is active
                if (!userData.activo) {
                    await auth.signOut();
                    showError('Tu cuenta está desactivada. Contacta al administrador');
                    loginBtn.disabled = false;
                    loginBtnText.style.display = 'inline';
                    loginSpinner.style.display = 'none';
                    return;
                }

                // Store user data in sessionStorage
                sessionStorage.setItem('adminUser', JSON.stringify({
                    uid: user.uid,
                    email: user.email,
                    nombre: userData.nombre,
                    rol: userData.rol,
                    permisos: userData.permisos || {},
                    tenantId: userData.tenantId ?? null
                }));

                // Recordar a este usuario en el directorio local del dispositivo
                upsertDirectorioCache(user.uid, userData.nombre, user.email);

                // Marca de cuándo inició sesión este dispositivo (en localStorage,
                // no sessionStorage: debe sobrevivir a pestañas nuevas y reinicios
                // del navegador) — admin-auth-init.js la compara contra
                // config/seguridad para saber si un "cerrar todas las sesiones" lo
                // dejó fuera.
                localStorage.setItem('mishellLoginEn', String(Date.now()));

                // Redirect to admin panel
                window.location.href = 'admin.html';

            } catch (error) {
                console.error('Login error:', error);

                let errorMsg = 'Error al iniciar sesión';

                switch (error.code) {
                    case 'auth/invalid-email':
                        errorMsg = 'Correo electrónico inválido';
                        break;
                    case 'auth/user-disabled':
                        errorMsg = 'Usuario deshabilitado';
                        break;
                    case 'auth/user-not-found':
                        errorMsg = 'Usuario no encontrado';
                        break;
                    case 'auth/wrong-password':
                        errorMsg = 'Contraseña incorrecta';
                        break;
                    case 'auth/too-many-requests':
                        errorMsg = 'Demasiados intentos fallidos. Intenta más tarde';
                        break;
                    case 'auth/network-request-failed':
                        errorMsg = 'Error de conexión. Verifica tu internet';
                        break;
                    case 'auth/invalid-credential':
                        errorMsg = 'Credenciales inválidas';
                        break;
                    default:
                        errorMsg = `Error: ${error.message}`;
                }

                showError(errorMsg);

                // Re-enable button
                loginBtn.disabled = false;
                loginBtnText.style.display = 'inline';
                loginSpinner.style.display = 'none';
            }
        });

        // Check if already logged in
        auth.onAuthStateChanged((user) => {
            if (user) {
                // Check if user data exists in sessionStorage
                const adminUser = sessionStorage.getItem('adminUser');
                if (adminUser) {
                    window.location.href = 'admin.html';
                }
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
